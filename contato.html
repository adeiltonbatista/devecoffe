<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevCoffee | Cafeteria Co-working</title>
   
    <link rel="stylesheet" href="stylecontato.css">
</head>


<body>
    <header>
        <nav>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="cardapio.html">Cardápio</a></li>
                <li><a href="contato.html">Contato</a></li>
                <li><a href="sobre.html">Sobre</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section class="contact-form">
            <h2>Solicitar reserva</h2>
            <form>
                <label for="nome-completo">Nome completo:</label>
                <input type="text" id="nome" name="nome" placeholder="jose da silva" required>




            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="jose@dominio.com" required><br><br>


            <label for="mensagem">Mensagem:</label><br>
            <textarea id="mensagem" name="mensagem" rows="5" cols="30" required></textarea><br><br>




            <label for="data-reserva">Data da reserva:</label>
            <input type="date" id="data-reserva" name="data-reserva" required><br><br>



            <label for="horario-reserva">Horário da reserva:</label>
            <input type="time" id="horario-reserva" name="horario-reserva" required><br><br>




            <label for="telefone">Telefone:</label>
            <input type="tel" id="telefone" name="telefone" placeholder="(00) 00000-0000" required>

            <button type="submit">Confirmar reserva</button>
            <div id="reserva-confirmada" class="confirmacao">
                Reserva confirmada! Entraremos em contato em breve.
            </div>
            </form>
        </section>
    </main>
    <footer>
        <p>© 2026 DevCoffee - Aberto todos os dias das 8h às 20h</p>
    </footer>
</body>

</html>
